name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Incrément de VERSION après la release (patch / minor / major)"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  release:
    name: Tag + GitHub Release + bump VERSION
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"

      - name: Validation release readiness
        run: |
          python3 scripts/generate_github_mirror.py
          python3 scripts/validate_farm.py

      - name: Lire VERSION
        id: current
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::VERSION invalide: '$VERSION' (format attendu X.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Vérifier l'absence du tag
        env:
          VERSION: ${{ steps.current.outputs.version }}
        run: |
          if git ls-remote --tags --exit-code origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Le tag v$VERSION existe déjà. Incrémente VERSION puis relance."
            exit 1
          fi

      - name: Créer et pousser le tag
        env:
          VERSION: ${{ steps.current.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Créer la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.current.outputs.version }}
          name: v${{ steps.current.outputs.version }}
          generate_release_notes: true
          body: |
            Version publiée depuis le fichier VERSION du dépôt.

      - name: Bump VERSION
        id: bump
        env:
          VERSION: ${{ steps.current.outputs.version }}
          BUMP: ${{ inputs.bump }}
        run: |
          IFS='.' read -r major minor patch <<< "$VERSION"
          case "$BUMP" in
            major) NEW="$((major + 1)).0.0" ;;
            minor) NEW="$major.$((minor + 1)).0" ;;
            *) NEW="$major.$minor.$((patch + 1))" ;;
          esac
          echo "$NEW" > VERSION
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit et push VERSION bumpée
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin HEAD:${{ github.ref_name }}
