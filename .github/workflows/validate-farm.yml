name: Validate farm

# CI de ce dépôt (ferme-agentique) lui-même — à ne pas confondre avec
# template/.github/ et examples/*/.github/, qui sont les fichiers Copilot
# copiés sur les projets cibles.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: .github/ à jour vis-à-vis de .claude/
        run: python3 scripts/generate_github_mirror.py

      - name: Validation (miroirs, outils, JSON)
        run: python3 scripts/validate_farm.py
